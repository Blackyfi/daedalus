global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: daedalus-self-hosted

scrape_configs:
  - job_name: daedalus-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

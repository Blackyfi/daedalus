# Daedalus — ISOLATED test-stack override.
#
# Purpose: bring the full app up with the 3FA bypass enabled so the UI can be
# driven end-to-end (Playwright / manual QA) with zero authentication friction
# and zero assumptions — WITHOUT touching the live `deploy-*` stack.
#
# Run it under its own Compose project so volumes, networks and containers are
# namespaced separately from production (the Makefile `test.*` targets do this):
#
#   DAEDALUS_HTTPS_PORT=9543 DAEDALUS_HTTP_PORT=9180 \
#     docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.test.yml \
#       --env-file .env -p daedalus-test up -d --build \
#       caddy api iris frontend postgres redis minio
#
# The alt ports keep it off the live 9443/9080. `make test.down` removes its
# volumes (project-scoped), so the test DB is always disposable.
#
# SAFETY: TEST_AUTH_BYPASS_ENABLED lives ONLY in this file. The production
# compose's x-common-env never forwards it, so it cannot reach the live stack
# even if present in .env. This override is the only thing that wires it in.

services:
  api:
    environment:
      # Exposes POST /api/v1/auth/test-login (mints a session with no factors).
      TEST_AUTH_BYPASS_ENABLED: "true"
      # No mTLS at the proxy on the test stack; the bypass binds the session to
      # the NO_MTLS sentinel instead of a client-cert fingerprint.
      REQUIRE_CLIENT_CERT: "false"
